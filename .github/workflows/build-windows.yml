name: Build Windows executable

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'cursor/**'
    paths:
      - 'windows_app/**'
      - 'Metatox.sh'
      - 'Scripts/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build MetaToxGUI.exe
        run: pyinstaller --noconfirm --clean windows_app/metatox_gui.spec

      - name: Create portable zip
        shell: pwsh
        run: |
          $dist = "dist/MetaToxGUI"
          Copy-Item Metatox.sh $dist/
          Copy-Item ExempleInput.txt $dist/
          Copy-Item -Recurse Scripts $dist/Scripts
          Copy-Item -Recurse CondaEnv $dist/CondaEnv
          Copy-Item windows_app/README_WINDOWS.md $dist/
          Compress-Archive -Path $dist/* -DestinationPath dist/MetaToxGUI-Windows.zip -Force

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetaToxGUI-Windows
          path: |
            dist/MetaToxGUI-Windows.zip
            dist/MetaToxGUI/MetaToxGUI.exe
          retention-days: 30
